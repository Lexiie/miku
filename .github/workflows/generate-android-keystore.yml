name: Generate Android Keystore

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore and secrets file
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p signing

          KEY_ALIAS="release"
          DNAME="CN=Miku Release, OU=Mobile, O=Miku, L=Jakarta, ST=DKI Jakarta, C=ID"
          VALIDITY_DAYS="10000"

          STORE_PASSWORD="$(openssl rand -hex 16)"
          KEY_PASSWORD="$STORE_PASSWORD"

          echo "::add-mask::$STORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"

          keytool -genkeypair \
            -keystore signing/release.jks \
            -storetype JKS \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity "$VALIDITY_DAYS" \
            -dname "$DNAME"

          base64 < signing/release.jks | tr -d '\n' > signing/release.jks.base64

          {
            echo "ANDROID_KEYSTORE_BASE64=$(cat signing/release.jks.base64)"
            echo "ANDROID_KEYSTORE_PASSWORD=$STORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$KEY_PASSWORD"
          } > signing/github-secrets.env

      - name: Upload signing artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-signing-materials
          path: signing/
          retention-days: 3
