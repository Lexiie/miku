name: Generate Android Keystore

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: "Key alias"
        required: false
        default: "release"
      dname:
        description: "X.500 name (CN=..., OU=..., O=..., L=..., ST=..., C=...)"
        required: false
        default: "CN=Miku Release, OU=Mobile, O=Miku, L=Jakarta, ST=DKI Jakarta, C=ID"
      validity_days:
        description: "Certificate validity in days"
        required: false
        default: "10000"

permissions:
  contents: read

concurrency:
  group: generate-android-keystore-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KEY_ALIAS: ${{ github.event.inputs.key_alias || 'release' }}
      DNAME: ${{ github.event.inputs.dname || 'CN=Miku Release, OU=Mobile, O=Miku, L=Jakarta, ST=DKI Jakarta, C=ID' }}
      VALIDITY_DAYS: ${{ github.event.inputs.validity_days || '10000' }}
    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore and secret values
        run: |
          set -eu

          mkdir -p signing

          STORE_PASSWORD="$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c 32)"
          KEY_PASSWORD="$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c 32)"

          echo "::add-mask::$STORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"

          keytool -genkeypair -v \
            -keystore signing/release.jks \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity "$VALIDITY_DAYS" \
            -dname "$DNAME"

          base64 -w 0 signing/release.jks > signing/release.jks.base64

          cat > signing/github-secrets.env <<EOF
ANDROID_KEYSTORE_BASE64=$(cat signing/release.jks.base64)
ANDROID_KEYSTORE_PASSWORD=$STORE_PASSWORD
ANDROID_KEY_ALIAS=$KEY_ALIAS
ANDROID_KEY_PASSWORD=$KEY_PASSWORD
EOF

          {
            echo "Android keystore berhasil dibuat."
            echo ""
            echo "Artifact berisi:"
            echo "- release.jks"
            echo "- release.jks.base64"
            echo "- github-secrets.env"
            echo ""
            echo "Isi \`github-secrets.env\` ke GitHub Secrets repo:"
            echo "- ANDROID_KEYSTORE_BASE64"
            echo "- ANDROID_KEYSTORE_PASSWORD"
            echo "- ANDROID_KEY_ALIAS"
            echo "- ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload signing artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-signing-materials
          path: signing/
          retention-days: 3
